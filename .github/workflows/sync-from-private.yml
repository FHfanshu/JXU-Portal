name: Sync From Private Source

on:
  workflow_dispatch:
  schedule:
    - cron: '*/10 * * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout public repository
        uses: actions/checkout@v5

      - name: Checkout private source repository
        uses: actions/checkout@v5
        with:
          repository: FHfanshu/ZJXU-portal
          ref: master
          path: source
          ssh-key: ${{ secrets.SOURCE_REPO_SSH_KEY }}
          persist-credentials: false

      - name: Capture source commit metadata
        shell: bash
        run: |
          managed_paths=(lib assets test README.md pubspec.yaml pubspec.lock analysis_options.yaml)
          {
            echo "SOURCE_COMMIT_SHA=$(git -C source log -1 --pretty=%h -- "${managed_paths[@]}")"
            echo "SOURCE_COMMIT_SUBJECT<<EOF"
            git -C source log -1 --pretty=%s -- "${managed_paths[@]}"
            echo "EOF"
            echo "SOURCE_COMMIT_BODY<<EOF"
            git -C source log -1 --pretty=%b -- "${managed_paths[@]}"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Sync managed files
        shell: bash
        run: |
          mkdir -p lib assets test
          rsync -a --delete source/lib/ lib/
          rsync -a --delete source/assets/ assets/
          rsync -a --delete source/test/ test/
          install -m 644 source/README.md README.md
          install -m 644 source/pubspec.yaml pubspec.yaml
          if [ -f source/pubspec.lock ]; then
            install -m 644 source/pubspec.lock pubspec.lock
          else
            rm -f pubspec.lock
          fi
          install -m 644 source/analysis_options.yaml analysis_options.yaml
          rm -rf source

      - name: Commit synced changes
        shell: bash
        run: |
          if [ -z "$(git status --porcelain -- lib assets test README.md pubspec.yaml pubspec.lock analysis_options.yaml)" ]; then
            echo "No synced changes detected."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib assets test README.md pubspec.yaml pubspec.lock analysis_options.yaml

          commit_message_file="$(mktemp)"
          printf '%s\n\n' "${SOURCE_COMMIT_SUBJECT:-chore: sync private source}" > "$commit_message_file"
          printf '同步来源: FHfanshu/ZJXU-portal@%s\n' "${SOURCE_COMMIT_SHA:-unknown}" >> "$commit_message_file"
          if [ -n "$(printf '%s' "$SOURCE_COMMIT_BODY" | tr -d '[:space:]')" ]; then
            printf '\n%s\n' "$SOURCE_COMMIT_BODY" >> "$commit_message_file"
          fi

          git commit -F "$commit_message_file"
          git push


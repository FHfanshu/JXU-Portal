name: jxu_portal_ui
description: "嘉兴大学校园门户 App UI 开源部分"
publish_to: 'none'
version: 0.2.2+3

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  go_router: ^14.0.0
  shared_preferences: ^2.3.0
  flutter_secure_storage: ^9.2.2
  url_launcher: ^6.3.1
  package_info_plus: ^8.0.0
  file_picker: ^10.1.9
  flutter_svg: ^2.0.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/